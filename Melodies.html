<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Melody Interactive Sheet Music</title>
    <!-- Tailwind CSS for modern, clean UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- VexFlow for rendering HTML5 Sheet Music and Tabs -->
    <script src="https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js"></script>
    <style>
        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 15px;
            cursor: grab;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-container:active { cursor: grabbing; }
        .scroll-container::-webkit-scrollbar { height: 10px; }
        .scroll-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
        .stave-wrapper { height: 420px; }

        /* --- BULLETPROOF HIGHLIGHT CSS --- */
        .highlight-note path, .highlight-note rect {
            fill: #ef4444 !important; /* Tailwind rose-500 */
            stroke: #ef4444 !important;
            transition: fill 0.05s ease, stroke 0.05s ease;
        }
        .highlight-note text, .highlight-note tspan {
            fill: #ef4444 !important;
            stroke: none !important; 
            font-weight: 900 !important;
            transition: fill 0.05s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-4 md:p-8">

                    <!-- Options populated by JS -->

            </div>
            
            <p class="text-md text-slate-600">Standard Notation, Violin Tab (4 Strings), and Guitar Tab (6 Strings).</p>
        </header>

        <!-- Container for dynamically injected key cards -->
        <div id="app" class="space-y-8"></div>
    </div>

        // --- 3. AUDIO & SYNCHRONIZATION ENGINE ---
        let audioCtx = null;
        let activeOscillators = [];
        let activeKeyId = null;
        let animationFrameId = null;
        let playbackSchedule = [];
        let currentlyHighlightedIdx = -1;
        let currentSong = songs[0];

        const beatLengths = { 'w': 4, 'h': 2, 'hd': 3, 'q': 1, 'qd': 1.5, '8': 0.5 };

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function stopAudio() {
            activeOscillators.forEach(osc => { try { osc.stop(); osc.disconnect(); } catch (e) {} });
            activeOscillators = [];
            cancelAnimationFrame(animationFrameId);
            clearHighlight();
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.innerHTML = `<svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" fill-rule="evenodd"></path></svg> Play`;
                btn.classList.remove('bg-rose-500', 'hover:bg-rose-600');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            });
        }

        function playKey(keyConfig, btnElement) {
            initAudio();
            stopAudio(); 

            btnElement.innerHTML = `<svg class="w-5 h-5 mr-2 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 002 0V8a1 1 0 00-1-1zm4 0a1 1 0 00-1 1v4a1 1 0 002 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg> Playing...`;
            btnElement.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btnElement.classList.add('bg-rose-500', 'hover:bg-rose-600');

            activeKeyId = keyConfig.id;
            playbackSchedule = [];

            const bpm = 120;
            const qTime = 60 / bpm; 
            let startTime = audioCtx.currentTime + 0.1; 

            currentSong.rhythm.forEach((noteData, index) => {
                const noteDef = keyConfig.notes[noteData.i + 3];
                const freq = 440 * Math.pow(2, (noteDef.m - 69) / 12);
                const durationSeconds = qTime * beatLengths[noteData.dur];

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                osc.type = 'triangle';
                osc.frequency.value = freq;

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.4, startTime + 0.05);
                gainNode.gain.setValueAtTime(0.4, startTime + (durationSeconds * 0.9) - 0.05);
                gainNode.gain.linearRampToValueAtTime(0, startTime + (durationSeconds * 0.9));

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start(startTime);
                osc.stop(startTime + durationSeconds);
                
                activeOscillators.push(osc);

                playbackSchedule.push({ idx: index, start: startTime, end: startTime + durationSeconds });
                startTime += durationSeconds;
            });

            animationFrameId = requestAnimationFrame(syncHighlightWithAudio);
        }
        
        function syncHighlightWithAudio() {
            if (!audioCtx || playbackSchedule.length === 0) return;

            const now = audioCtx.currentTime;
            const currentNote = playbackSchedule.find(n => now >= n.start && now < n.end);

            if (currentNote) {
                if (currentlyHighlightedIdx !== currentNote.idx) {
                    clearHighlight();
                    setHighlight(activeKeyId, currentNote.idx);
                    currentlyHighlightedIdx = currentNote.idx;
                }
            } else {
                const lastNote = playbackSchedule[playbackSchedule.length - 1];
                if (now > lastNote.end) {
                    clearHighlight();
                    stopAudio(); // completely resets state
                    return; 
                } else if (currentlyHighlightedIdx !== -1) {
                    clearHighlight(); 
                }
            }
            animationFrameId = requestAnimationFrame(syncHighlightWithAudio);
        }

        function setHighlight(keyId, noteIdx) {
            const std = document.getElementById(`std-${keyId}-${noteIdx}`);
            const vio = document.getElementById(`vio-${keyId}-${noteIdx}`);
            const gui = document.getElementById(`gui-${keyId}-${noteIdx}`);
            if (std) std.classList.add('highlight-note');
            if (vio) vio.classList.add('highlight-note');
            if (gui) gui.classList.add('highlight-note');
        }

        function clearHighlight() {
            if (activeKeyId && currentlyHighlightedIdx !== -1) {
                const std = document.getElementById(`std-${activeKeyId}-${currentlyHighlightedIdx}`);
                const vio = document.getElementById(`vio-${activeKeyId}-${currentlyHighlightedIdx}`);
                const gui = document.getElementById(`gui-${activeKeyId}-${currentlyHighlightedIdx}`);
                if (std) std.classList.remove('highlight-note');
                if (vio) vio.classList.remove('highlight-note');
                if (gui) gui.classList.remove('highlight-note');
            }
            currentlyHighlightedIdx = -1;
        }

        // --- 4. VEXFLOW SHEET MUSIC RENDERER ---
        const VF = Vex.Flow;

        function createNoteWithDot(vfClass, config) {
            const note = new vfClass(config);
            if (config.duration.includes('d')) {
                note.addModifier(new VF.Dot(), 0);
            }
            return note;
        }

        function drawSheetMusicAndTabs(containerId, keyConfig) {
            const div = document.getElementById(containerId);
            div.innerHTML = ''; // Clear previous render
            
            // Calculate width dynamically based on measures to prevent squishing
            const standardMeasureWidth = 145;
            const totalWidth = (currentSong.measures.length * standardMeasureWidth) + 100;
            
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            renderer.resize(Math.max(1180, totalWidth), 420); 
            const context = renderer.getContext();

            const stdStaveY = 25;
            const vioStaveY = 150;
            const guiStaveY = 275;

            context.setFont("Arial", 12, "bold").setFillStyle("#64748b");
            context.fillText("Standard Notation", 15, stdStaveY - 5);
            context.fillText("Violin Tablature", 15, vioStaveY - 5);
            context.fillText("Guitar Tablature", 15, guiStaveY - 5);

            let currentX = 10;
            const numBeats = parseInt(currentSong.timeSig.split('/')[0]);
            const beatValue = parseInt(currentSong.timeSig.split('/')[1]);

            currentSong.measures.forEach((measureIndices, mIdx) => {
                const width = mIdx === 0 ? standardMeasureWidth + 80 : standardMeasureWidth;
                
                const stave = new VF.Stave(currentX, stdStaveY, width);
                const violinTabStave = new VF.TabStave(currentX, vioStaveY, width, { num_lines: 4 });
                const guitarTabStave = new VF.TabStave(currentX, guiStaveY, width, { num_lines: 6 });
                
                if (mIdx === 0) {
                    stave.addClef("treble").addKeySignature(keyConfig.sig).addTimeSignature(currentSong.timeSig);
                    violinTabStave.addClef("tab");
                    guitarTabStave.addClef("tab");
                }
                
                if (mIdx === currentSong.measures.length - 1) {
                    stave.setEndBarType(VF.Barline.type.END);
                    violinTabStave.setEndBarType(VF.Barline.type.END);
                    guitarTabStave.setEndBarType(VF.Barline.type.END);
                }

                stave.setContext(context).draw();
                violinTabStave.setContext(context).draw();
                guitarTabStave.setContext(context).draw();

                const stdNotes = [];
                const vioNotes = [];
                const guiNotes = [];

                measureIndices.forEach(idx => {
                    const noteData = currentSong.rhythm[idx];
                    const noteDef = keyConfig.notes[noteData.i + 3]; // +3 because our index -3 is array [0]
                    
                    stdNotes.push(createNoteWithDot(VF.StaveNote, { keys: [noteDef.v], duration: noteData.dur }));
                    
                    vioNotes.push(createNoteWithDot(VF.TabNote, {
                        positions: [{ str: noteDef.vi.s, fret: noteDef.vi.f.toString() }],
                        duration: noteData.dur
                    }));

                    guiNotes.push(createNoteWithDot(VF.TabNote, {
                        positions: [{ str: noteDef.g.s, fret: noteDef.g.f.toString() }],
                        duration: noteData.dur
                    }));
                });

                // Disable strict timing to handle pickups gracefully
                const stdVoice = new VF.Voice({ num_beats: numBeats, beat_value: beatValue }).setStrict(false).addTickables(stdNotes);
                const vioVoice = new VF.Voice({ num_beats: numBeats, beat_value: beatValue }).setStrict(false).addTickables(vioNotes);
                const guiVoice = new VF.Voice({ num_beats: numBeats, beat_value: beatValue }).setStrict(false).addTickables(guiNotes);
                
                new VF.Formatter()
                    .joinVoices([stdVoice, vioVoice, guiVoice])
                    .formatToStave([stdVoice, vioVoice, guiVoice], stave);

                const prevStdCount = div.querySelectorAll('.vf-stavenote').length;
                const prevTabCount = div.querySelectorAll('.vf-tabnote').length;

                stdVoice.draw(context, stave);
                vioVoice.draw(context, violinTabStave);
                const afterVioTabCount = div.querySelectorAll('.vf-tabnote').length;
                guiVoice.draw(context, guitarTabStave);

                const allRenderedStd = div.querySelectorAll('.vf-stavenote');
                const allRenderedTabs = div.querySelectorAll('.vf-tabnote');

                measureIndices.forEach((globalIdx, localIdx) => {
                    const stdElement = allRenderedStd[prevStdCount + localIdx];
                    const vioElement = allRenderedTabs[prevTabCount + localIdx];
                    const guiElement = allRenderedTabs[afterVioTabCount + localIdx];

                    if (stdElement) stdElement.id = `std-${keyConfig.id}-${globalIdx}`;
                    if (vioElement) vioElement.id = `vio-${keyConfig.id}-${globalIdx}`;
                    if (guiElement) guiElement.id = `gui-${keyConfig.id}-${globalIdx}`;
                });

                currentX += stave.width;
            });
            
            // Re-adjust container minimum width to match generated stave
            div.parentElement.style.minWidth = totalWidth + "px";
        }

        // --- 5. APP INITIALIZATION & UI ROUTING ---
        function renderApp() {
            stopAudio();
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = ''; // Clear previous song

            keysConfig.forEach(keyConfig => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in";
                
                const header = document.createElement('div');
                header.className = "p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50";
                
                const titleBlock = document.createElement('div');
                titleBlock.innerHTML = `
                    <h2 class="text-xl font-bold text-slate-800">${keyConfig.name}</h2>
                    <p class="text-sm text-slate-500 font-medium">${keyConfig.subtitle}</p>
                `;

                const playBtn = document.createElement('button');
                playBtn.className = "play-btn flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2";
                playBtn.innerHTML = `<svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" fill-rule="evenodd"></path></svg> Play`;
                playBtn.onclick = () => playKey(keyConfig, playBtn);

                header.appendChild(titleBlock);
                header.appendChild(playBtn);

                const musicContainer = document.createElement('div');
                musicContainer.className = "scroll-container p-4";
                
                const vexflowDiv = document.createElement('div');
                vexflowDiv.id = `vf-${keyConfig.id}`;
                vexflowDiv.className = "stave-wrapper";
                
                musicContainer.appendChild(vexflowDiv);
                card.appendChild(header);
                card.appendChild(musicContainer);
                appContainer.appendChild(card);

                drawSheetMusicAndTabs(`vf-${keyConfig.id}`, keyConfig);
            });
        }

        function setupSelector() {
            const select = document.getElementById('song-select');
            songs.forEach((song, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.text = song.title;
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                currentSong = songs[e.target.value];
                renderApp();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupSelector();
            renderApp();
        });

    </script>
</body>
